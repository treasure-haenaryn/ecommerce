receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # 컬렉터 자체가 메모리를 너무 많이 먹지 않도록 보호
  memory_limiter:
    check_interval: 1s
    limit_mib: 200
  # 여러 서비스에서 온 스팬/메트릭을 모아서 더 크고 안정적인 배치로 묶어 전송
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlp:
    endpoint: grafana-lgtm:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp]
