services:

  kafka:
    image: apache/kafka:4.3.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller   # combined 모드: 이 노드가 브로커+컨트롤러 겸함
      # PLAINTEXT: 호스트(내 PC)에서 접속용, DOCKER: 다른 컨테이너(kafka-ui 등)에서 접속용
      KAFKA_LISTENERS: PLAINTEXT://:9092,DOCKER://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,DOCKER://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,DOCKER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093   # quorum 1개, HA 아님 (로컬 전용)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  kafka-ui:
    image: provectuslabs/kafka-ui:latest   # 토픽/메시지 확인용 (학습 도구, 필수 아님)
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094   # 컨테이너 전용 DOCKER 리스너로 접속
    depends_on:
      - kafka

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}     # .env 참조
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql   # 서비스별 DB 5개 생성
      - postgres-data:/var/lib/postgresql/data

  grafana-lgtm:
    image: grafana/otel-lgtm:latest   # Loki(로그)+Grafana(시각화)+Tempo(트레이스)+Prometheus(메트릭) 올인원, 로컬 검증용
    container_name: grafana-lgtm
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC 수신
      - "4318:4318"   # OTLP HTTP 수신

volumes:
  postgres-data:
